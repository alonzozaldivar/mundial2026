        :root {

            --color-rojo: #b71c1c;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--color-azul);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, var(--color-verde) 0%, var(--color-azul) 50%, var(--color-rojo) 100%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 90%;
            background-image: url('https://img.icons8.com/color/512/000000/trophy.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.12;
            z-index: -1;
        }

        @media (min-width: 600px) { body { padding: 20px; } }

        .header-container { text-align: center; padding: 40px 0 20px 0; }
        .header-container h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 5rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 50%, #bdbdbd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 6px 0px rgba(0,0,0,0.3));
            transform: skew(-5deg);
        }

        @media (max-width: 600px) { .header-container h1 { font-size: 3.2rem; letter-spacing: 2px; } }

        .container { max-width: 1100px; margin: 0 auto; flex: 1; width: 100%; box-sizing: border-box; }
        
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            padding: 12px 18px; font-size: 13px; font-weight: 700; cursor: pointer; border: none;
            border-radius: 12px; background: rgba(0,0,0,0.3); color: white; transition: all 0.3s;
            flex: 1 1 calc(33% - 10px); text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }
        @media (min-width: 600px) { .tab-btn { flex: none; padding: 14px 35px; font-size: 15px; } }
        .tab-btn.active { background: #fff; color: var(--color-azul); box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: none; }

        .seccion { 
            background: var(--glass-bg); padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.25); 
            margin-bottom: 30px; display: none; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(5px);
        }
        .seccion.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid-tablas { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 20px; }
        .tabla-responsiva { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 15px; }
        .lista-partidos { max-height: 550px; overflow-y: auto; padding: 5px; }
        
        .partido { 
            display: flex; flex-direction: column; padding: 20px; background: white; margin-bottom: 14px; border-radius: 18px; 
            gap: 15px; border: 1px solid #eee; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .partido:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); }
        
        @media (min-width: 650px) { .partido { flex-direction: row; justify-content: space-between; align-items: center; gap: 0; } }

        .info-partido { font-size: 11px; color: #999; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; text-align: center; }
        @media (min-width: 650px) { .info-partido { width: 24%; text-align: left; } }
        
        .equipo-bloque { 
            display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; width: 100%; justify-content: center; color: #2c3e50; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        @media (min-width: 650px) {
            .equipo-bloque { width: 30%; font-size: 16px; gap: 14px; }
            .equipo-bloque.local { justify-content: flex-end; text-align: right; }
            .equipo-bloque.visitante { justify-content: flex-start; text-align: left; }
        }
        .bandera-icon { width: 34px; height: auto; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.15); flex-shrink: 0; border: 1px solid #eee; }
        
        .marcador-container { display: flex; flex-direction: column; align-items: center; width: 100%; flex-shrink: 0; }
        @media (min-width: 650px) { .marcador-container { width: 16%; } }
        .marcador { display: flex; justify-content: center; gap: 12px; align-items: center; }
        
        .marcador input { 
            width: 60px; text-align: center; padding: 8px 6px; font-size: 22px; border: 2px solid #eaedf0; border-radius: 12px;

        }
        .marcador input::-webkit-outer-spin-button,
        .marcador input::-webkit-inner-spin-button {

function inicializarPartidosGrupos() {

function actualizarGolesGrupo(id, tipo, valor) {
    const partido = datosMundial.partidos.find(p => p.id === id);
    if (partido) {
        partido[tipo === 'L' ? 'golesL' : 'golesV'] = (valor === "") ? "" : parseInt(valor);
        guardarYCalcular();
    }
}

function calcularTablas() {
    cacheEstadisticas = {};
    for (let g in datosMundial.grupos) {
        datosMundial.grupos[g].forEach(eq => {
            cacheEstadisticas[eq] = { nombre: eq, grupo: g, PJ: 0, G: 0, E: 0, P: 0, GF: 0, GC: 0, PTS: 0 };
        });
    }
    datosMundial.partidos.forEach(p => {
        if (p.golesL !== "" && p.golesV !== "" && p.golesL !== null && p.golesV !== null) {
            let gL = parseInt(p.golesL); let gV = parseInt(p.golesV);
            let el = cacheEstadisticas[p.local]; let ev = cacheEstadisticas[p.visitante];
            if (el && ev) {
                el.PJ++; ev.PJ++; el.GF += gL; el.GC += gV; ev.GF += gV; ev.GC += gL;
                if (gL > gV) { el.G++; el.PTS += 3; ev.P++; }
                else if (gV > gL) { ev.G++; ev.PTS += 3; el.P++; }
                else { el.E++; el.PTS += 1; ev.E++; ev.PTS += 1; }
            }
        }
    });
    renderizarTablasYSectorTerceros();
}

function renderizarTablasYSectorTerceros() {
    const contenedor = document.getElementById("contenedor-tablas");
    if (!contenedor) return;
    contenedor.innerHTML = "";
    let terceros = [];
    for (let g in datosMundial.grupos) {
        let listaEquipos = datosMundial.grupos[g].map(eq => cacheEstadisticas[eq]);
        listaEquipos.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
        if(listaEquipos[2]) terceros.push(listaEquipos[2]);
        let htmlTabla = `<div><h4 style="margin:10px 0; color:var(--color-azul); text-align:center;">GRUPO ${g}</h4><div class="tabla-responsiva"><table><thead><tr><th>País</th><th>PJ</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
        listaEquipos.forEach((eq, index) => {
            let clase = index < 2 ? 'class="clasificado-directo"' : '';
            let dg = eq.GF - eq.GC;
            htmlTabla += `<tr ${clase}><td style="text-align:left; padding-left:12px; display:flex; align-items:center; gap:8px;">${generarHTMLIdEquipo(eq.nombre, false)}</td><td>${eq.PJ}</td><td>${dg > 0 ? '+'+dg : dg}</td><td><b>${eq.PTS}</b></td></tr>`;
        });
        htmlTabla += `</tbody></table></div></div>`;
        contenedor.innerHTML += htmlTabla;
    }
    terceros.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
    let htmlT = `<table><thead><tr><th>Pos</th><th>País</th><th>DG</th><th>PTS</th><th>Estado</th></tr></thead><tbody>`;
    terceros.forEach((eq, i) => {
        if(eq) {
            let clasifica = i < 8; let dg = eq.GF - eq.GC;
            htmlT += `<tr><td style="padding:5px;"><b>${i+1}</b></td><td style="text-align:left; display:flex; align-items:center; gap:10px;">${generarHTMLIdEquipo(eq.nombre, false)}</td><td>${dg>0?'+'+dg:dg}</td><td><b>${eq.PTS}</b></td><td><small>${clasifica?'🏆':'❌'}</small></td></tr>`;
        }
    });
    htmlT += `</tbody></table>`;
    document.getElementById("tabla-mejores-terceros").innerHTML = htmlT;
}

function inicializarRondasSiguientes() {
    datosMundial.eliminatorias.octavos = []; datosMundial.eliminatorias.cuartos = []; datosMundial.eliminatorias.semis = [];
    for(let i=89; i<=96; i++) datosMundial.eliminatorias.octavos.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    for(let i=97; i<=100; i++) datosMundial.eliminatorias.cuartos.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    for(let i=101; i<=102; i++) datosMundial.eliminatorias.semis.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    datosMundial.eliminatorias.final = [{ id: 103, local: "Finalista L", visitante: "Finalista V", golesL:"", golesV:"", ganadorPenaltis:"" }];
}

function obtenerGanador(partido) {
    if (!partido || partido.golesL === "" || partido.golesV === "" || partido.golesL === null || partido.golesV === null) return null;
    if (parseInt(partido.golesL) > parseInt(partido.golesV)) return partido.local;
    if (parseInt(partido.golesV) > parseInt(partido.golesL)) return partido.visitante;
    if (partido.ganadorPenaltis === 'L') return partido.local;
    if (partido.ganadorPenaltis === 'V') return partido.visitante;
    return null;
}

function encadenarSiguienteRonda(faseActual) {
    let el = datosMundial.eliminatorias;
    if (faseActual === 'r16vos') {
        let cruces = [[73,74], [75,76], [77,78], [79,80], [81,82], [83,84], [85,86], [87,88]];
        cruces.forEach((par, index) => {
            el.octavos[index].local = obtenerGanador(el.r16vos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.octavos[index].visitante = obtenerGanador(el.r16vos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'octavos') {
        let cruces = [[89,90], [91,92], [93,94], [95,96]];
        cruces.forEach((par, index) => {
            el.cuartos[index].local = obtenerGanador(el.octavos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.cuartos[index].visitante = obtenerGanador(el.octavos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'cuartos') {
        let cruces = [[97,98], [99,100]];
        cruces.forEach((par, index) => {
            el.semis[index].local = obtenerGanador(el.cuartos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.semis[index].visitante = obtenerGanador(el.cuartos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'semis') {
        el.final[0].local = obtenerGanador(el.semis.find(p=>p.id === 101)) || "Finalista L";
        el.final[0].visitante = obtenerGanador(el.semis.find(p=>p.id === 102)) || "Finalista V";
    }
}

function renderizarFaseEliminatoria(fase) {
    const contenedor = document.getElementById(`contenedor-${fase === 'r16vos' ? '16vos' : fase}`);
    if (!contenedor) return;
    contenedor.innerHTML = "";
    let listaPartidos = datosMundial.eliminatorias[fase];
    if (!listaPartidos || listaPartidos.length === 0) {
        contenedor.innerHTML = "<p class='alerta-vacio'>⚠️ Primero debes procesar la Fase de Grupos.</p>";
        return;
    }
    listaPartidos.forEach(p => {
        const div = document.createElement("div");
        div.className = "partido";
        let selectPenaltis = "";
        let esDesconocido = (p.local && p.local.includes("Ganador")) || (p.visitante && p.visitante.includes("Ganador"));
        if (p.golesL !== "" && p.golesV !== "" && parseInt(p.golesL) === parseInt(p.golesV) && !esDesconocido) {
            selectPenaltis = `
                <div class="penaltis">
                    Ganador Penaltis: 
                    <select onchange="actualizarPenaltis('${fase}', ${p.id}, this.value)">
                        <option value="">--</option>
                        <option value="L" ${p.ganadorPenaltis === 'L'?'selected':''}>${p.local}</option>
                        <option value="V" ${p.ganadorPenaltis === 'V'?'selected':''}>${p.visitante}</option>
                    </select>
                </div>
            `;
        }
        div.innerHTML = `
            <div class="info-partido"><b>PARTIDO N° ${p.id}</b></div>
            <div class="equipo-bloque local">${generarHTMLIdEquipo(p.local, true)}</div>
            <div class="marcador-container">
                <div class="marcador">
                    <input type="number" min="0" value="${p.golesL}" onchange="actualizarGolesEliminatoria('${fase}', ${p.id}, 'L', this.value)">
                    <span style="font-weight:900; color:#cbd5e1">VS</span>
                    <input type="number" min="0" value="${p.golesV}" onchange="actualizarGolesEliminatoria('${fase}', ${p.id}, 'V', this.value)">
                </div>
                ${selectPenaltis}
            </div>
            <div class="equipo-bloque visitante">${generarHTMLIdEquipo(p.visitante, false)}</div>
        `;
        contenedor.appendChild(div);
    });
}

function actualizarGolesEliminatoria(fase, id, tipo, valor) {
    const partido = datosMundial.eliminatorias[fase].find(p => p.id === id);
    if (partido) {
        partido[tipo === 'L' ? 'golesL' : 'golesV'] = (valor === "") ? "" : parseInt(valor);
        if (partido.golesL !== partido.golesV) partido.ganadorPenaltis = "";
        encadenarSiguienteRonda(fase);
        localStorage.setItem("mundial2026_db_v46", JSON.stringify(datosMundial));
        renderizarFaseEliminatoria(fase);
    }
}

function actualizarPenaltis(fase, id, winner) {
    const partido = datosMundial.eliminatorias[fase].find(p => p.id === id);
    if (partido) {
        partido.ganadorPenaltis = winner;
        encadenarSiguienteRonda(fase);
        localStorage.setItem("mundial2026_db_v46", JSON.stringify(datosMundial));
    }
}

function guardarYCalcular() {
    localStorage.setItem("mundial2026_db_v46", JSON.stringify(datosMundial));
    calcularTablas();
}

function cambiarPestaña(fase) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
    const btnMap = { 'grupos': 0, 'r16vos': 1, 'octavos': 2, 'cuartos': 3, 'semis': 4, 'final': 5 };
    document.querySelectorAll('.tab-btn')[btnMap[fase]].classList.add('active');
    const secId = fase === 'grupos' ? 'sec-grupos' : `sec-${fase}`;
    document.getElementById(secId).classList.add('active');
    if (fase !== 'grupos') renderizarFaseEliminatoria(fase);
}
