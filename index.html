        .tab-btn.active { background-color: #1e3d59; color: white; }

        @media (min-width: 600px) { .seccion { padding: 20px; margin-bottom: 30px; } }
        .seccion.active { display: block; }
        .grid-tablas { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 15px; }
        @media (min-width: 600px) { .grid-tablas { gap: 20px; } }

        @media (min-width: 650px) { .info-partido { width: 20%; text-align: left; border-bottom: none; padding-bottom: 0; } }

        @media (min-width: 650px) { .equipo-label { width: 30%; } .local { justify-content: flex-end; text-align: right; } .visitante { justify-content: flex-start; text-align: left; } }

function cambiarPestaña(fase) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
    const btnMap = { 'grupos': 0, 'r16vos': 1, 'octavos': 2, 'cuartos': 3, 'semis': 4, 'final': 5 };
    document.querySelectorAll('.tab-btn')[btnMap[fase]].classList.add('active');
    const secId = fase === 'grupos' ? 'sec-grupos' : `sec-${fase}`;
    document.getElementById(secId).classList.add('active');
    if (fase !== 'grupos') renderizarFaseEliminatoria(fase);
}

function guardarYCalcular() {
    localStorage.setItem("mundial2026_final_v9", JSON.stringify(datosMundial));
    calcularTablas();
}

function inicializarPartidosGrupos() {
    const contenedor = document.getElementById("contenedor-partidos");
    if (!contenedor) return;
    contenedor.innerHTML = "";
    datosMundial.partidos.forEach(p => {
        const div = document.createElement("div");
        div.className = "partido";
        div.innerHTML = `
            <div class="info-partido"><b>N° ${p.id}</b> | ${p.fecha} - ${p.horario}</div>
            <span class="equipo-label local">${f(p.local, true)}</span>
            <div class="marcador">
                <input type="number" min="0" value="${p.golesL}" onchange="actualizarGolesGrupo(${p.id}, 'L', this.value)">
                <span>-</span>
                <input type="number" min="0" value="${p.golesV}" onchange="actualizarGolesGrupo(${p.id}, 'V', this.value)">
            </div>
            <span class="equipo-label visitante">${f(p.visitante, false)}</span>
        `;
        contenedor.appendChild(div);
    });
}

function actualizarGolesGrupo(id, tipo, valor) {
    const partido = datosMundial.partidos.find(p => p.id === id);
    if (partido) {
        partido[tipo === 'L' ? 'golesL' : 'golesV'] = (valor === "") ? "" : parseInt(valor);
        guardarYCalcular();
    }
}

function calcularTablas() {
    cacheEstadisticas = {};
    for (let g in datosMundial.grupos) {
        datosMundial.grupos[g].forEach(eq => {
            cacheEstadisticas[eq] = { nombre: eq, grupo: g, PJ: 0, G: 0, E: 0, P: 0, GF: 0, GC: 0, PTS: 0 };
        });
    }
    datosMundial.partidos.forEach(p => {
        if (p.golesL !== "" && p.golesV !== "" && p.golesL !== null && p.golesV !== null) {
            let gL = p.golesL; let gV = p.golesV;
            let el = cacheEstadisticas[p.local]; let ev = cacheEstadisticas[p.visitante];
            if (el && ev) {
                el.PJ++; ev.PJ++; el.GF += gL; el.GC += gV; ev.GF += gV; ev.GC += gL;
                if (gL > gV) { el.G++; el.PTS += 3; ev.P++; }
                else if (gV > gL) { ev.G++; ev.PTS += 3; el.P++; }
                else { el.E++; el.PTS += 1; ev.E++; ev.PTS += 1; }
            }
        }
    });
    renderizarTablasYSectorTerceros();
}

function renderizarTablasYSectorTerceros() {
    const contenedor = document.getElementById("contenedor-tablas");
    if (!contenedor) return;
    contenedor.innerHTML = "";
    let terceros = [];
    for (let g in datosMundial.grupos) {
        let listaEquipos = datosMundial.grupos[g].map(eq => cacheEstadisticas[eq]);
        listaEquipos.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
        terceros.push(listaEquipos[2]);
        let htmlTabla = `<div><h3>Grupo ${g}</h3><div class="tabla-responsiva"><table><thead><tr><th>Equipo</th><th>PJ</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
        listaEquipos.forEach((eq, index) => {
            let clase = index < 2 ? 'class="clasificado-directo"' : (index === 2 ? 'class="zona-espera"' : '');
            let dg = eq.GF - eq.GC;
            htmlTabla += `<tr ${clase}><td style="text-align:left; padding-left:8px; display:flex; align-items:center; gap:6px;"><b>${index+1}.</b> ${f(eq.nombre, false)}</td><td>${eq.PJ}</td><td>${dg > 0 ? '+'+dg : dg}</td><td><b>${eq.PTS}</b></td></tr>`;
        });
        htmlTabla += `</tbody></table></div></div>`;
        contenedor.innerHTML += htmlTabla;
    }
    terceros.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
    let htmlT = `<table><thead><tr><th>Pos</th><th>Equipo</th><th>Grupo</th><th>DG</th><th>PTS</th><th>Estado</th></tr></thead><tbody>`;
    terceros.forEach((eq, i) => {
        if(eq) {
            let clasifica = i < 8; let dg = eq.GF - eq.GC;
            htmlT += `<tr ${clasifica ? 'class="clasificado-directo"':''}><td style="padding:5px;"><b>${i+1}</b></td><td style="text-align:left; display:flex; align-items:center; gap:6px;">${f(eq.nombre, false)}</td><td>Grupo ${eq.grupo}</td><td>${dg>0?'+'+dg:dg}</td><td><b>${eq.PTS}</b></td><td><b>${clasifica?'CLASIFICA ✅':'ELIMINADO ❌'}</b></td></tr>`;
        }
    });
    htmlT += `</tbody></table>`;
    document.getElementById("tabla-mejores-terceros").innerHTML = htmlT;
}

function avanzarADieciseisavos() {
    let incompleto = datosMundial.partidos.some(p => p.golesL === "" || p.golesV === "");
    if (incompleto) { alert("⚠️ Completa primero todos los marcadores de la fase de grupos."); return; }
    let clasificados = {}; let terceros = [];
    for (let g in datosMundial.grupos) {
        let lista = datosMundial.grupos[g].map(eq => cacheEstadisticas[eq]);
        lista.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
        clasificados["1" + g] = lista[0].nombre; clasificados["2" + g] = lista[1].nombre;
        terceros.push(lista[2]);
    }
    terceros.sort((a, b) => (b.PTS - a.PTS) || ((b.GF - b.GC) - (a.GF - a.GC)) || (b.GF - a.GF));
    for (let i = 0; i < 8; i++) { if(terceros[i]) clasificados["3_" + (i+1)] = terceros[i].nombre; }

    const emparejamientos = [
        { id: 73, l: clasificados["1A"], v: clasificados["3_1"] }, { id: 74, l: clasificados["1E"], v: clasificados["2A"] },
        { id: 75, l: clasificados["1I"], v: clasificados["3_2"] }, { id: 76, l: clasificados["1C"], v: clasificados["2B"] },
        { id: 77, l: clasificados["2C"], v: clasificados["2D"] }, { id: 78, l: clasificados["1G"], v: clasificados["3_3"] },
        { id: 79, l: clasificados["1K"], v: clasificados["2E"] }, { id: 80, l: clasificados["1H"], v: clasificados["2F"] },
        { id: 81, l: clasificados["1B"], v: clasificados["3_4"] }, { id: 82, l: clasificados["1F"], v: clasificados["2G"] },
        { id: 83, l: clasificados["1J"], v: clasificados["3_5"] }, { id: 84, l: clasificados["1D"], v: clasificados["2H"] },
        { id: 85, l: clasificados["2I"], v: clasificados["2J"] }, { id: 86, l: clasificados["1L"], v: clasificados["3_6"] },
        { id: 87, l: clasificados["1F"], v: clasificados["3_7"] }, { id: 88, l: clasificados["2K"], v: clasificados["2L"] }
    ];
    datosMundial.eliminatorias.r16vos = emparejamientos.map(emp => {
        let ex = datosMundial.eliminatorias.r16vos.find(p => p.id === emp.id);
        return { id: emp.id, local: emp.l || "Desconocido", visitante: emp.v || "Desconocido", golesL: ex?ex.golesL:"", golesV: ex?ex.golesV:"", ganadorPenaltis: ex?ex.ganadorPenaltis:"" };
    });
    if(datosMundial.eliminatorias.octavos.length === 0) inicializarRondasSiguientes();
    localStorage.setItem("mundial2026_final_v9", JSON.stringify(datosMundial));
    alert("🎉 ¡Dieciseisavos de Final generados con éxito!");
    cambiarPestaña('r16vos');
}

function inicializarRondasSiguientes() {
    datosMundial.eliminatorias.octavos = []; datosMundial.eliminatorias.cuartos = []; datosMundial.eliminatorias.semis = [];
    for(let i=89; i<=96; i++) datosMundial.eliminatorias.octavos.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    for(let i=97; i<=100; i++) datosMundial.eliminatorias.cuartos.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    for(let i=101; i<=102; i++) datosMundial.eliminatorias.semis.push({ id: i, local: "Ganador ?", visitante: "Ganador ?", golesL:"", golesV:"", ganadorPenaltis:"" });
    datosMundial.eliminatorias.final = [{ id: 103, local: "Ganador SF1", visitante: "Ganador SF2", golesL:"", golesV:"", ganadorPenaltis:"" }];
}

function obtenerGanador(partido) {
    if (!partido || partido.golesL === "" || partido.golesV === "" || partido.golesL === null || partido.golesV === null) return null;
    if (partido.golesL > partido.golesV) return partido.local;
    if (partido.golesV > partido.golesL) return partido.visitante;
    if (partido.ganadorPenaltis === 'L') return partido.local;
    if (partido.ganadorPenaltis === 'V') return partido.visitante;
    return null;
}

function encadenarSiguienteRonda(faseActual) {
    let el = datosMundial.eliminatorias;
    if (faseActual === 'r16vos') {
        let cruces = [[73,74], [75,76], [77,78], [79,80], [81,82], [83,84], [85,86], [87,88]];
        cruces.forEach((par, index) => {
            el.octavos[index].local = obtenerGanador(el.r16vos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.octavos[index].visitante = obtenerGanador(el.r16vos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'octavos') {
        let cruces = [[89,90], [91,92], [93,94], [95,96]];
        cruces.forEach((par, index) => {
            el.cuartos[index].local = obtenerGanador(el.octavos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.cuartos[index].visitante = obtenerGanador(el.octavos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'cuartos') {
        let cruces = [[97,98], [99,100]];
        cruces.forEach((par, index) => {
            el.semis[index].local = obtenerGanador(el.cuartos.find(p=>p.id === par[0])) || "Ganador " + par[0];
            el.semis[index].visitante = obtenerGanador(el.cuartos.find(p=>p.id === par[1])) || "Ganador " + par[1];
        });
    } else if (faseActual === 'semis') {
        el.final[0].local = obtenerGanador(el.semis.find(p=>p.id === 101)) || "Ganador SF1";
        el.final[0].visitante = obtenerGanador(el.semis.find(p=>p.id === 102)) || "Ganador SF2";
    }
}

function renderizarFaseEliminatoria(fase) {
    const contenedor = document.getElementById(`contenedor-${fase === 'r16vos' ? '16vos' : fase}`);
    if (!contenedor) return;
    contenedor.innerHTML = "";
    let listaPartidos = datosMundial.eliminatorias[fase];
    if (!listaPartidos || listaPartidos.length === 0) {
        contenedor.innerHTML = "<p class='alerta-vacio'>⚠️ Primero debes procesar la Fase de Grupos.</p>";
        return;
    }
    listaPartidos.forEach(p => {
        const div = document.createElement("div");
        div.className = "partido";
        let selectPenaltis = "";
        let esDesconocido = p.local.includes("Ganador") || p.visitante.includes("Ganador") || p.local.includes("SF");
        if (p.golesL !== "" && p.golesV !== "" && p.golesL === p.golesV && !esDesconocido) {
            selectPenaltis = `
                <div class="penaltis">
                    Penaltis: 
                    <select onchange="actualizarPenaltis('${fase}', ${p.id}, this.value)">
                        <option value="">--</option>
                        <option value="L" ${p.ganadorPenaltis === 'L'?'selected':''}>${p.local}</option>
                        <option value="V" ${p.ganadorPenaltis === 'V'?'selected':''}>${p.visitante}</option>
                    </select>
                </div>
            `;
        }
        div.innerHTML = `
            <div class="info-partido"><b>Partido N° ${p.id}</b></div>
            <span class="equipo-label local">${f(p.local, true)}</span>
            <div class="marcador-container" style="text-align:center;">
                <div class="marcador">
                    <input type="number" min="0" value="${p.golesL}" onchange="actualizarGolesEliminatoria('${fase}', ${p.id}, 'L', this.value)">
                    <span>-</span>
                    <input type="number" min="0" value="${p.golesV}" onchange="actualizarGolesEliminatoria('${fase}', ${p.id}, 'V', this.value)">
                </div>
                ${selectPenaltis}
            </div>
            <span class="equipo-label visitante">${f(p.visitante, false)}</span>
        `;
        contenedor.appendChild(div);
    });
}

function actualizarGolesEliminatoria(fase, id, tipo, valor) {
    const partido = datosMundial.eliminatorias[fase].find(p => p.id === id);
    if (partido) {
        partido[tipo === 'L' ? 'golesL' : 'golesV'] = (valor === "") ? "" : parseInt(valor);
        if (partido.golesL !== partido.golesV) partido.ganadorPenaltis = "";
        encadenarSiguienteRonda(fase);
        localStorage.setItem("mundial2026_final_v9", JSON.stringify(datosMundial));
        renderizarFaseEliminatoria(fase);
    }
}

function actualizarPenaltis(fase, id, ganador) {
    const partido = datosMundial.eliminatorias[fase].find(p => p.id === id);
    if (partido) {
        partido.ganadorPenaltis = ganador;
        encadenarSiguienteRonda(fase);
        localStorage.setItem("mundial2026_final_v9", JSON.stringify(datosMundial));
    }
}

// --- NUEVAS FUNCIONES DE RESPALDO Y DESCARGA ---
function descargarDatos() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datosMundial, null, 2));
    const downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", "respaldo_mundial2026.json");
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
}

function cargarDatos(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const datosCargados = JSON.parse(e.target.result);
            if (datosCargados.grupos && datosCargados.partidos && datosCargados.eliminatorias) {
                datosMundial = datosCargados;
                localStorage.setItem("mundial2026_final_v9", JSON.stringify(datosMundial));
                inicializarPartidosGrupos();
                calcularTablas();
                alert("✅ ¡Respaldo cargado con éxito!");
                location.reload();
            } else {
                alert("⚠️ El archivo no tiene el formato correcto del Mundial.");
            }
        } catch (err) {
            alert("❌ Error al leer el archivo JSON.");
        }
    };
    reader.readAsText(file);
}

window.onload = function() { inicializarPartidosGrupos(); calcularTablas(); };
</script>
